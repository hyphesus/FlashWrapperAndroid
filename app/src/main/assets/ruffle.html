<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FlashWrapper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #FF6B35; font-family: monospace; font-size: 14px;
      background: #000; z-index: 100;
    }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #333;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-family: monospace; font-size: 13px;
      background: #0D0D0D; padding: 24px; text-align: center;
      z-index: 200;
    }
    #error h2 { color: #FF6B35; margin-bottom: 12px; }
    #error p { color: #888; line-height: 1.6; }
    ruffle-player {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading Ruffle...</span>
</div>

<div id="error">
  <h2>⚠ Could not load game</h2>
  <p id="errorMsg">The SWF file could not be found or loaded.<br><br>Try providing a direct .swf URL instead of a game page URL.</p>
</div>

<script>
  // The Android app will call: loadGame(swfUrl)
  var pendingUrl = null;
  var ruffleReady = false;

  function loadGame(url) {
    pendingUrl = url;
    document.getElementById('loading').style.display = 'flex';
    if (ruffleReady) {
      startRuffle(url);
    }
  }

  function startRuffle(url) {
    try {
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      player.style.width = '100vw';
      player.style.height = '100vh';
      document.body.appendChild(player);
      player.load({
        url: url,
        allowScriptAccess: false,
        backgroundColor: '#000000',
        scale: 'showAll',
        wmode: 'window',
        menu: false
      }).then(function() {
        document.getElementById('loading').style.display = 'none';
      }).catch(function(e) {
        showError('Failed to load: ' + e.message);
      });
    } catch(e) {
      showError(e.message);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('errorMsg').innerText = msg;
    document.getElementById('error').style.display = 'flex';
  }

  // Load Ruffle from CDN
  var script = document.createElement('script');
  script.src = 'https://unpkg.com/@ruffle-rs/ruffle';
  script.onload = function() {
    ruffleReady = true;
    if (pendingUrl) {
      startRuffle(pendingUrl);
    }
  };
  script.onerror = function() {
    showError('Could not load Ruffle. Check your internet connection.');
  };
  document.head.appendChild(script);
</script>

</body>
</html>
